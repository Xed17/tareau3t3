server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/db_reserva
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: "YourSuperSecretKeyForJWTGenerationThatIsLongEnoughToAvoidErrors123456!"
  expiration: 86400 # 1 day in seconds
